<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardify | Digital Business Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0C0C0F;
            --bg-end: #10101A;
            --accent: #C9A84C;
            --text-primary: #EEEEF4;
            --text-secondary: #AAAAAF;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            display: flex; justify-content: center; align-items: center;
        }

        #card-container {
            width: 90%; max-width: 400px;
            aspect-ratio: 1.6 / 1;
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0; transform: translateY(20px);
            transition: all 0.6s ease;
        }

        #card-container.visible {
            opacity: 1; transform: translateY(0);
        }

        .profile-section { display: flex; align-items: center; gap: 16px; }
        .photo-placeholder {
            width: 64px; height: 64px; border-radius: 50%;
            background: #1E1E28; border: 2px solid var(--accent);
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: 24px; color: var(--accent);
            overflow: hidden;
        }
        .photo-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .info h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 900; }
        .info p { margin: 0; font-size: 0.9rem; color: var(--accent); font-weight: 700; }

        .contact-section { font-size: 0.85rem; color: var(--text-secondary); display: flex; flex-direction: column; gap: 4px; }
        .company { font-weight: 700; color: var(--text-primary); margin-bottom: 4px; font-size: 0.9rem; }

        #loader { font-size: 1.5rem; font-weight: 900; color: #C9A84C; letter-spacing: 4px; }

        /* Themes */
        .theme-cognac { --accent: #C9A84C; background: linear-gradient(135deg, #14100A 0%, #1C1208 100%); }
        .theme-midnight { --accent: #CDD5E8; background: linear-gradient(135deg, #10121E 0%, #141828 100%); }
        .theme-rosewood { --accent: #D4888E; background: linear-gradient(135deg, #1A0C10 0%, #220E12 100%); }
        .theme-forest { --accent: #7AB8A0; background: linear-gradient(135deg, #081210 0%, #0E1A14 100%); }
        .theme-sapphire { --accent: #6B9FE4; background: linear-gradient(135deg, #08101E 0%, #0C1428 100%); }
    </style>
</head>
<body>
    <div id="loader">CARDIFY...</div>
    <div id="card-container">
        <div class="profile-section">
            <div id="photo" class="photo-placeholder"></div>
            <div class="info">
                <h1 id="name">...</h1>
                <p id="title">...</p>
            </div>
        </div>
        <div class="contact-section">
            <div id="company" class="company">...</div>
            <div id="email">...</div>
            <div id="phone">...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Firebase configuration derived from google-services.json
        const firebaseConfig = {
  apiKey: "AIzaSyDKMCCjCg7P2WwcVtjgmQ53ncuM0NcOJsE",
  authDomain: "cardify-nsnkn.firebaseapp.com",
  projectId: "cardify-nsnkn",
  storageBucket: "cardify-nsnkn.firebasestorage.app",
  messagingSenderId: "9900474538",
  appId: "1:9900474538:web:49c45242dea131750010d3"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadProfile() {
            const params = new URLSearchParams(window.location.search);
            const cardId = params.get('id');
            const userId = params.get('uid');

            console.log("=== Cardify QR Code Scan ===");
            console.log("Card ID:", cardId);
            console.log("User ID:", userId);
            console.log("URL:", window.location.href);

            if (!cardId || !userId) {
                console.error("Missing parameters - cardId:", cardId, "userId:", userId);
                document.getElementById('loader').innerText = "INVALID LINK";
                return;
            }

            try {
                // Fetch the card from the user's userCards collection
                const docPath = `users/${userId}/userCards/${cardId}`;
                console.log("Querying Firestore path:", docPath);

                const docSnap = await getDoc(doc(db, "users", userId, "userCards", cardId));

                console.log("Document exists:", docSnap.exists());
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    console.log("Document data:", data);
                    renderProfile(data);
                } else {
                    console.error("Document not found at path:", docPath);
                    document.getElementById('loader').innerText = "USER NOT FOUND";
                }
            } catch (e) {
                console.error("Error loading profile:", e);
                console.error("Error code:", e.code);
                console.error("Error message:", e.message);
                document.getElementById('loader').innerText = "SYNC ERROR";
            }
        }

        function renderProfile(data) {
            document.getElementById('name').innerText = data.name || "N/A";
            document.getElementById('title').innerText = data.jobTitle || "";
            document.getElementById('company').innerText = data.company || "";
            document.getElementById('email').innerText = data.email || "";
            document.getElementById('phone').innerText = data.phone || "";

            const photoEl = document.getElementById('photo');
            if (data.photoUrl) {
                photoEl.innerHTML = `<img src="${data.photoUrl}" alt="${data.name}">`;
            } else {
                photoEl.innerText = data.name ? data.name.charAt(0).toUpperCase() : "?";
            }

            const container = document.getElementById('card-container');
            container.className = `theme-${data.theme || 'cognac'}`;

            document.getElementById('loader').style.display = 'none';
            container.classList.add('visible');
        }

        loadProfile();
    </script>
</body>
</html>
